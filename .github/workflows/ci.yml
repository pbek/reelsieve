name: "🧪 CI"

on:
  push:
    branches-ignore: ["release"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: "🐹 Go"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go build -trimpath -ldflags="-s -w" ./cmd/reelsieve

  docker:
    name: "🐳 Docker"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: reelsieve:ci

  nix:
    name: "❄️ Nix"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - run: nix flake check
      - run: nix build .#reelsieve
