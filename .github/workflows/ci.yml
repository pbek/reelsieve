name: "🧪 CI"

on:
  push:
    branches-ignore: ["release"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: "🐹 Go"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go build -trimpath -ldflags="-s -w -X main.version=0.1" ./cmd/reelsieve

  nix:
    name: "❄️ Nix"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - run: nix flake check
      - run: nix build .#reelsieve
