name: "🚀 Release"

on:
  push:
    branches: ["release"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: "🐳 Docker"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          version="$(tr -d '[:space:]' < internal/version/VERSION)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
      - name: Check Version Tag
        if: github.ref == 'refs/heads/release'
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists. Bump internal/version/VERSION before releasing."
            exit 1
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/release' }}
            type=raw,value=v${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/release' }}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: "🏷️ GoReleaser"
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/release'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        run: |
          version="$(tr -d '[:space:]' < internal/version/VERSION)"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version in internal/version/VERSION: ${version}"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
      - name: Create Version Tag
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists. Bump internal/version/VERSION before releasing."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
      - name: Build Release Notes From Changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v version="${version}" '
            $0 ~ "^##[[:space:]]+" version "([[:space:]]+-|[[:space:]]*$)" { found = 1; next }
            found && /^##[[:space:]]+/ { exit }
            found { print }
            END { exit found ? 0 : 1 }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG.md entry found for ${version}."
            exit 1
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=/tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
