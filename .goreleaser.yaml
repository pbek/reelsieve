version: 2

project_name: reelsieve

builds:
  - id: reelsieve
    main: ./cmd/reelsieve
    binary: reelsieve
    flags:
      - -trimpath
    ldflags:
      - -s -w
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: reelsieve
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  name_template: "{{ .Tag }}"
